<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Блянер — Выбор за тобой</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        blyaner: {
                            purple: '#8B7EC8',
                            purpleDark: '#6A5AAB',
                            lime: '#D4E84D',
                            dark: '#2D2B3D',
                            gray: '#F4F3F8',
                            sidebar: '#8B7EC8'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #2D2B3D; margin: 0; padding: 0; overflow-x: hidden; }

        /* Анимация для убегающей кнопки */
        #runaway-btn {
            position: absolute;
            transition: top 0.2s ease-out, left 0.2s ease-out;
            will-change: top, left;
        }

        .noise-bg {
            background-color: #F4F3F8;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
        }
    </style>
</head>
<body class="antialiased">

    <!-- Полноэкранная секция, разделенная ровно пополам -->
    <section class="relative w-full min-h-screen flex flex-col lg:flex-row">
        
        <!-- Центральный бейджик "Выбор за тобой" (виден на десктопе между половинками) -->
        <div class="absolute top-10 left-1/2 transform -translate-x-1/2 z-50 hidden lg:flex flex-col items-center pointer-events-none">
            <div class="bg-white text-blyaner-dark px-10 py-4 rounded-full shadow-2xl font-black text-2xl border border-gray-100 uppercase tracking-widest">
                Выбор за тобой
            </div>
        </div>

        <!-- ЛЕВАЯ ПОЛОВИНА (Серый фон, Прокрастинация) -->
        <div id="runaway-container" class="relative flex-1 noise-bg flex flex-col items-center justify-center p-10 lg:p-20 text-center min-h-[50vh] lg:min-h-screen border-b lg:border-b-0 lg:border-r border-gray-200">
            
            <div class="relative z-10 pointer-events-none mb-10 max-w-md">
                <!-- Мобильный заголовок -->
                <h2 class="text-3xl font-black text-blyaner-dark mb-8 lg:hidden uppercase tracking-widest">Выбор за тобой</h2>
                
                <div class="w-20 h-20 bg-white rounded-full flex items-center justify-center mx-auto mb-8 shadow-sm text-gray-400">
                    <i class="ph-fill ph-calendar-x text-4xl"></i>
                </div>
                <h3 class="text-4xl lg:text-5xl font-black text-blyaner-dark mb-4">Я подумаю об этом завтра</h3>
                <p class="text-lg text-gray-500 font-medium">С чистой совестью перенести все задачи на следующий день.</p>
            </div>

            <!-- УБЕГАЮЩАЯ КНОПКА -->
            <button id="runaway-btn" class="px-8 py-4 bg-white text-gray-500 border-2 border-gray-200 font-bold text-lg rounded-full shadow-md flex items-center gap-3 whitespace-nowrap z-20">
                <i class="ph-bold ph-clock-counter-clockwise text-xl"></i>
                Отложить на завтра
            </button>

            <!-- Невидимый плейсхолдер, чтобы текст не прыгал -->
            <div class="h-16 w-full opacity-0 pointer-events-none"></div>
        </div>

        <!-- ПРАВАЯ ПОЛОВИНА (Фиолетовый фон, Работа) -->
        <div class="relative flex-1 bg-blyaner-sidebar flex flex-col items-center justify-center p-10 lg:p-20 text-center min-h-[50vh] lg:min-h-screen overflow-hidden group">
            
            <!-- Блики для красоты -->
            <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-white/10 rounded-full blur-[100px] -translate-y-1/3 translate-x-1/3 pointer-events-none transition-transform duration-1000 group-hover:scale-110"></div>
            <div class="absolute bottom-0 left-0 w-[500px] h-[500px] bg-blyaner-lime/20 rounded-full blur-[100px] translate-y-1/3 -translate-x-1/3 pointer-events-none transition-transform duration-1000 group-hover:scale-110"></div>

            <div class="relative z-10 mb-10 max-w-md">
                <div class="w-20 h-20 bg-white/20 backdrop-blur-md border border-white/30 rounded-full flex items-center justify-center mx-auto mb-8 text-white">
                    <i class="ph-fill ph-rocket-launch text-4xl"></i>
                </div>
                <h3 class="text-4xl lg:text-5xl font-black text-white mb-4">Я сделаю это сегодня</h3>
                <p class="text-lg text-white/80 font-medium">Пора перестать себя обманывать. Заходим, закрываем таски, идём отдыхать по-настоящему.</p>
            </div>

            <!-- СТАТИЧНАЯ КНОПКА -->
            <button class="relative z-20 px-8 py-4 bg-blyaner-lime text-blyaner-dark font-bold text-lg rounded-full shadow-2xl hover:scale-105 hover:shadow-[0_20px_40px_rgba(212,232,77,0.4)] transition-all duration-300 flex items-center gap-3">
                <i class="ph-bold ph-sign-in text-xl"></i>
                Войти в Блянер
            </button>

            <!-- Плейсхолдер для симметрии -->
            <div class="h-16 w-full opacity-0 pointer-events-none"></div>
        </div>

    </section>

    <script>
        const btn = document.getElementById('runaway-btn');
        const container = document.getElementById('runaway-container');

        function centerButton() {
            const containerRect = container.getBoundingClientRect();
            const btnRect = btn.getBoundingClientRect();
            
            // Ставим кнопку ровно по центру нижней части блока (там, где плейсхолдер)
            btn.style.left = `${(containerRect.width - btnRect.width) / 2}px`;
            
            // Зависит от мобильного или десктопного вида
            const offsetBase = window.innerWidth >= 1024 ? 120 : 80;
            btn.style.top = `${containerRect.height / 2 + offsetBase}px`;
        }

        window.addEventListener('load', centerButton);
        window.addEventListener('resize', centerButton);

        // Убегание
        btn.addEventListener('mouseenter', () => {
            const containerRect = container.getBoundingClientRect();
            const btnRect = btn.getBoundingClientRect();
            
            const paddingX = 40;
            const paddingY = 80;
            const maxX = containerRect.width - btnRect.width - paddingX;
            const maxY = containerRect.height - btnRect.height - paddingY;
            
            const randomX = Math.max(paddingX, Math.floor(Math.random() * maxX));
            const randomY = Math.max(paddingY, Math.floor(Math.random() * maxY));
            
            btn.style.left = `${randomX}px`;
            btn.style.top = `${randomY}px`;
        });
        
        btn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            btn.dispatchEvent(new Event('mouseenter'));
        });
    </script>
</body>
</html>
