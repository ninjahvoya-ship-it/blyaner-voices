<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Блянер — Внутренние голоса</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        blyaner: {
                            purple: '#8B7EC8',
                            purpleDark: '#6A5AAB',
                            lime: '#D4E84D',
                            dark: '#2D2B3D',
                            pink: '#F9A8D4'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #ffffff; color: #2D2B3D; overflow-x: hidden; }
        
        @keyframes float-slow {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }
        
        .sticker-wrapper {
            position: relative;
            z-index: 10;
            animation: float-slow 7s ease-in-out infinite;
        }
        
        .sticker-wrapper:hover {
            z-index: 100;
        }

        .sticker-card {
            transform: rotate(var(--rotation));
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); 
            cursor: pointer;
            will-change: transform, box-shadow;
        }

        .sticker-wrapper:hover .sticker-card {
            transform: rotate(0deg) scale(1.12) translateY(-10px) !important;
            box-shadow: 0 30px 60px rgba(0,0,0,0.15);
        }

        .delay-1 { animation-delay: 0.5s; }
        .delay-2 { animation-delay: 1s; }
        .delay-3 { animation-delay: 1.5s; }
        .delay-4 { animation-delay: 2s; }
        .delay-5 { animation-delay: 2.5s; }
        
        .noise-bg {
            background-color: #F4F3F8;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
        }
    </style>
</head>
<body class="antialiased">

        <!-- Навигация -->
    <nav class="fixed top-6 left-0 right-0 z-50 flex justify-center px-4 pointer-events-none">
        <div class="bg-white/80 backdrop-blur-xl border border-gray-100 rounded-full px-5 py-1.5 flex justify-between items-center w-full max-w-5xl shadow-sm h-[52px] pointer-events-auto">
            <a href="https://blyaner-site.vercel.app" class="text-lg font-black text-[#2D2B3D] tracking-tight flex items-center gap-2 hover:opacity-80 transition-opacity">
                <i class="ph-fill ph-asterisk text-[#8B7EC8]"></i> Блянер
            </a>
            
            <div class="hidden md:flex items-center gap-1 bg-gray-50 p-1 rounded-full border border-gray-100 h-[40px]">
                <a href="index.html" class="px-4 py-1.5 rounded-full text-xs font-bold bg-white text-[#2D2B3D] shadow-sm pointer-events-none flex items-center h-full">Стикеры</a>
                <a href="graph.html" class="px-4 py-1.5 rounded-full text-xs font-bold text-gray-500 hover:text-[#2D2B3D] hover:bg-white/50 transition-colors flex items-center h-full">График</a>
                <a href="runaway.html" class="px-4 py-1.5 rounded-full text-xs font-bold text-gray-500 hover:text-[#2D2B3D] hover:bg-white/50 transition-colors flex items-center h-full">Кнопки</a>
            </div>

            <a href="#" onclick="alert('Блянер ещё в разработке! Переходи на главную страницу и записывайся на закрытый тест.'); return false;" class="bg-gray-100 text-gray-400 px-5 py-1 flex items-center rounded-full text-sm font-bold cursor-not-allowed shadow-sm">
                Войти
            </a>
        </div>
    </nav>

    <section class="noise-bg relative border-y border-gray-200 pt-32 pb-32 overflow-x-hidden min-h-screen flex flex-col">
        
        <div class="max-w-4xl mx-auto text-center relative z-20 px-6 mb-16">
            <h2 class="text-4xl lg:text-5xl font-black mb-4 text-[#2D2B3D]">Внутренние голоса</h2>
            <p class="text-lg text-gray-500 font-medium">Что думает твой мозг, когда ты пытаешься спланировать неделю.</p>
        </div>

        <!-- Вернули max-w-[1500px], чтобы на больших экранах блок не разваливался в 2 ряда -->
        <div class="flex flex-wrap justify-center items-center w-full max-w-[1500px] mx-auto px-4" id="stickers-container">
            <!-- Stickers will be generated here by JS -->
        </div>
    </section>

    <script>
        const data = [
            ["Она опять скачала новый планер...", "Внутренний критик", "ph-user"],
            ["Зато этот красивый и фиолетовенький!", "Внутренний ребёнок", "ph-star"],
            ["Давай просто оставим всё на понедельник и будем страдать.", "Прокрастинатор", "ph-calendar-x"],
            ["Нажимаем «Сплю» и расходимся.", "Здравый смысл", "ph-bed"],
            ["Я скачала его только ради тёмной темы.", "Эстет", "ph-moon"],
            ["Ого, таймер показал 4 часа. Пойду лягу.", "Реалист", "ph-timer"],
            ["Завтра точно начну!", "Оптимист", "ph-sun"],
            ["Где кнопка «пускай оно как-то само»?", "Лентяй", "ph-magic-wand"],
            ["Уже 14:00, день потерян, переносим всё.", "Паникер", "ph-warning"],
            ["Этот планер знает, что я прокрастинирую, и не осуждает.", "Друг", "ph-heart"],
            ["Запланировать отдых — это тоже работа, да?", "Уставший", "ph-coffee"],
            ["Главное — красиво раскрасить теги.", "Перфекционист", "ph-palette"],
            ["Перенос задач — мой любимый вид спорта.", "Спортсмен", "ph-person-simple-run"],
            ["Я не ленивая, я энергосберегающая.", "Эко-активист", "ph-battery-low"],
            ["Может, если я запишу задачу, она решится сама?", "Философ", "ph-brain"],
            ["Сон 12 часов. Достижение разблокировано.", "Геймер", "ph-game-controller"],
            ["Дедлайн? Я думала, это просто рекомендация.", "Бунтарь", "ph-flag"],
            ["Пятница — день прощения долгов (себе).", "Священник", "ph-hands-praying"],
            ["Кто вообще придумал работать по понедельникам?", "Историк", "ph-book-open"],
            ["Сделала одну задачу. Награждаю себя тремя часами тиктока.", "Тиктокер", "ph-device-mobile"],
            ["Пока я спала, таски сами себя не сделали. Странно.", "Мечтатель", "ph-cloud"],
            ["Обожаю это чувство, когда переносишь всё на следующую неделю.", "Садист", "ph-smiley-wink"],
            ["Мне нужен планер для планера.", "Архитектор", "ph-buildings"],
            ["Таймер показал 12 минут. Я выжата как лимон.", "Драматик", "ph-mask-sad"],
            ["Забыла нажать «Встала». Теперь планер думает, что я в коме.", "Киборг", "ph-robot"],
            ["Выделила проект красным, чтобы игнорировать его было тревожнее.", "Тревожный", "ph-bell-ringing"],
            ["В любой непонятной ситуации нажимай «Сплю».", "Гуру", "ph-yin-yang"],
            ["Где здесь кнопка «сдаться»?", "Слабак", "ph-flag-banner"],
            ["Просто добавлю огоньков, чтобы казалось, что я молодец.", "Иллюзионист", "ph-fire"],
            ["Выполнено 0 из 10. Отличный результат!", "Математик", "ph-calculator"]
        ];

        const styles = [
            { card: "bg-white text-gray-800 border-gray-100", icon_bg: "bg-gray-200", icon_color: "text-gray-500", tag_color: "text-gray-400" },
            { card: "bg-[#D4E84D] text-[#2D2B3D] border-[#D4E84D]", icon_bg: "bg-[#2D2B3D]", icon_color: "text-[#D4E84D]", tag_color: "text-[#2D2B3D]/60" },
            { card: "bg-[#8B7EC8] text-white border-[#6A5AAB]", icon_bg: "bg-white/20", icon_color: "text-white", tag_color: "text-white/70" },
            { card: "bg-[#2D2B3D] text-white border-gray-700", icon_bg: "bg-gray-700", icon_color: "text-gray-300", tag_color: "text-gray-400" },
            { card: "bg-[#F9A8D4] text-gray-900 border-pink-300", icon_bg: "bg-gray-900", icon_color: "text-[#F9A8D4]", tag_color: "text-gray-700/60" }
        ];

        const shuffled = [...data].sort(() => 0.5 - Math.random());
        const container = document.getElementById('stickers-container');

        // Оставляем только 30 штук! Без дубликатов.
        shuffled.forEach((item, i) => {
            const [phrase, tag, icon] = item;
            const style = styles[Math.floor(Math.random() * styles.length)];
            
            const w = Math.floor(Math.random() * (290 - 240 + 1)) + 240;
            const rot = Math.floor(Math.random() * (16 - (-16) + 1)) + (-16);
            const delay = Math.floor(Math.random() * 5) + 1;
            
            let mt = Math.floor(Math.random() * (10 - (-20) + 1)) + (-20);
            let ml = Math.floor(Math.random() * (-5 - (-25) + 1)) + (-25);

            const wrapper = document.createElement('div');
            wrapper.className = `sticker-wrapper delay-${delay} shrink-0`;
            wrapper.style.cssText = `margin-top:${mt}px; margin-left:${ml}px; margin-bottom:-15px;`;
            
            wrapper.innerHTML = `
                <div class="sticker-card ${style.card} p-5 rounded-3xl shadow-lg border w-full h-full flex flex-col justify-between" style="width:${w}px; min-height:130px; --rotation:${rot}deg;">
                    <p class="font-bold text-base leading-snug mb-5">${phrase}</p>
                    <div class="flex items-center gap-2 ${style.tag_color}">
                        <div class="w-6 h-6 rounded-full ${style.icon_bg} ${style.icon_color} flex items-center justify-center shrink-0">
                            <i class="ph-fill ${icon} text-xs"></i>
                        </div>
                        <p class="text-[10px] font-bold uppercase tracking-widest">${tag}</p>
                    </div>
                </div>
            `;
            container.appendChild(wrapper);
        });
    </script>
</body>
</html>
